<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="claude-anyteam">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <path d="M0 160 H1280 M0 320 H1280 M0 480 H1280"/>
    <path d="M320 0 V640 M640 0 V640 M960 0 V640"/>
  </g>

  <!-- Mark -->
  <g transform="translate(200,320)">
    <circle r="80" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.5"/>
    <circle r="16" fill="url(#grad)"/>
    <circle cx="56" cy="-56" r="12" fill="#22d3ee"/>
    <circle cx="56" cy="56" r="12" fill="#60a5fa"/>
    <circle cx="-80" cy="0" r="12" fill="#a78bfa"/>
  </g>

  <!-- Wordmark -->
  <text x="360" y="280" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="82" font-weight="700" fill="#f8fafc">claude</text>
  <text x="580" y="280" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="82" font-weight="700" fill="url(#grad)">-anyteam</text>

  <!-- Headline -->
  <text x="360" y="350" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="500" fill="#cbd5e1">Native Claude Code teammates, any LLM.</text>

  <!-- Subline -->
  <text x="360" y="400" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="400" fill="#94a3b8">Codex today. Gemini, Kimi, GLM, DeepSeek next.</text>

  <!-- Chips -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" font-weight="600">
    <g transform="translate(360,470)">
      <rect width="240" height="56" rx="12" fill="#10a37f"/>
      <text x="120" y="38" text-anchor="middle" fill="#ffffff">✓ codex · shipping</text>
    </g>
    <g transform="translate(620,470)">
      <rect width="180" height="56" rx="12" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
      <text x="90" y="38" text-anchor="middle" fill="#94a3b8">gemini · next</text>
    </g>
    <g transform="translate(820,470)">
      <rect width="160" height="56" rx="12" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
      <text x="80" y="38" text-anchor="middle" fill="#94a3b8">kimi · next</text>
    </g>
    <g transform="translate(1000,470)">
      <rect width="140" height="56" rx="12" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
      <text x="70" y="38" text-anchor="middle" fill="#94a3b8">glm · next</text>
    </g>
  </g>

  <!-- Bottom install command -->
  <text x="360" y="580" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" fill="#64748b">$ npx --yes --package claude-anyteam claude-anyteam-setup</text>
</svg>
